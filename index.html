<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>给小辛</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(170deg, #FCE4D6 0%, #F8C4B4 30%, #F5A8A8 60%, #F9DCC4 100%);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  /* Floating petals */
  .petals {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .petal {
    position: absolute;
    opacity: 0.35;
    animation: floatDown linear infinite;
  }
  @keyframes floatDown {
    0%   { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
    10%  { opacity: 0.4; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(105vh) rotate(360deg) translateX(40px); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 1;
    width: 92vw;
    max-width: 400px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 28px;
    padding: 36px 28px 32px;
    box-shadow: 0 8px 40px rgba(180,100,80,0.18), 0 2px 8px rgba(180,100,80,0.08);
    text-align: center;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .card:active {
    transform: scale(0.97);
    box-shadow: 0 4px 20px rgba(180,100,80,0.15);
  }

  /* Illustration area */
  .illustration {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 0 auto 20px;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .card.revealed .illustration {
    transform: scale(0.72) translateY(-12px);
  }

  /* Hearts floating around */
  .floating-hearts {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .floating-heart {
    position: absolute;
    animation: heartFloat 3s ease-in-out infinite;
    opacity: 0;
  }
  .floating-heart:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; font-size: 16px; }
  .floating-heart:nth-child(2) { top: 5%; right: 8%; animation-delay: 0.8s; font-size: 13px; }
  .floating-heart:nth-child(3) { bottom: 15%; left: 0; animation-delay: 1.6s; font-size: 14px; }
  .floating-heart:nth-child(4) { bottom: 10%; right: 5%; animation-delay: 2.2s; font-size: 17px; }
  @keyframes heartFloat {
    0%, 100% { opacity: 0; transform: translateY(0) scale(0.6); }
    30% { opacity: 0.7; }
    70% { opacity: 0.5; }
    50% { transform: translateY(-14px) scale(1.1); }
  }

  .title {
    font-size: 26px;
    font-weight: 700;
    color: #8B4A3A;
    margin-bottom: 6px;
    letter-spacing: 2px;
    transition: all 0.5s ease;
  }
  .card.revealed .title {
    font-size: 18px;
    margin-bottom: 2px;
  }

  .subtitle {
    font-size: 13px;
    color: #C0846A;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .tap-hint {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #C0846A;
    animation: gentlePulse 2s ease-in-out infinite;
  }
  .tap-hint .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #E8A090;
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .tap-hint .dot:nth-child(2) { animation-delay: 0.15s; }
  .tap-hint .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes gentlePulse {
    0%, 100% { opacity: 0.6; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-3px); }
  }
  @keyframes dotBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  .card.revealed .tap-hint {
    animation: none;
    opacity: 0.8;
  }
  .card.revealed .tap-hint-text {
    font-size: 12px;
  }

  /* Message area */
  .message-wrapper {
    position: relative;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 8px;
    transition: min-height 0.5s ease;
  }
  .card.revealed .message-wrapper {
    min-height: 100px;
  }

  .message {
    font-size: 17px;
    line-height: 1.8;
    color: #6B3A2E;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 12px 4px;
    animation: fadeSlideIn 0.55s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message-counter {
    font-size: 11px;
    color: #C9A090;
    margin-top: 6px;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .card.revealed .message-counter {
    opacity: 1;
  }

  /* Decorative line */
  .deco-line {
    width: 40px;
    height: 2px;
    background: #E8B4A0;
    border-radius: 1px;
    margin: 0 auto 14px;
    transition: width 0.5s ease;
  }
  .card.revealed .deco-line {
    width: 60px;
  }
</style>
</head>
<body>

<!-- Floating petals background -->
<div class="petals" id="petals"></div>

<!-- Main card -->
<div class="card" id="card" onclick="showMessage()">
  <!-- SVG Illustration of two girls hugging -->
  <div class="illustration">
    <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <!-- Floating hearts around them -->
      <g class="floating-hearts">
        <text x="20" y="30" font-size="14" class="floating-heart">♥</text>
        <text x="180" y="25" font-size="12" class="floating-heart">♥</text>
        <text x="10" y="170" font-size="13" class="floating-heart">♥</text>
        <text x="190" y="175" font-size="15" class="floating-heart">♥</text>
      </g>

      <!-- Left girl hair (longer, in back) -->
      <ellipse cx="80" cy="82" rx="32" ry="34" fill="#4A2C2A" />
      <rect x="50" y="80" width="18" height="48" rx="9" fill="#4A2C2A" />
      <rect x="94" y="78" width="16" height="50" rx="8" fill="#4A2C2A" />

      <!-- Right girl hair (shoulder length) -->
      <ellipse cx="142" cy="80" rx="30" ry="32" fill="#3A2218" />
      <rect x="128" y="78" width="16" height="40" rx="8" fill="#3A2218" />
      <rect x="154" y="76" width="14" height="42" rx="7" fill="#3A2218" />

      <!-- Faces -->
      <ellipse cx="82" cy="78" rx="24" ry="26" fill="#FDDCB5" />
      <ellipse cx="140" cy="76" rx="23" ry="25" fill="#FED7B0" />

      <!-- Rosy cheeks -->
      <ellipse cx="71" cy="84" rx="7" ry="4.5" fill="#F5A8A8" opacity="0.5" />
      <ellipse cx="93" cy="84" rx="7" ry="4.5" fill="#F5A8A8" opacity="0.5" />
      <ellipse cx="130" cy="82" rx="6.5" ry="4" fill="#F5A8A8" opacity="0.5" />
      <ellipse cx="150" cy="82" rx="6.5" ry="4" fill="#F5A8A8" opacity="0.5" />

      <!-- Eyes -->
      <circle cx="73" cy="74" r="2.8" fill="#3A2218" />
      <circle cx="91" cy="74" r="2.8" fill="#3A2218" />
      <circle cx="131" cy="72" r="2.6" fill="#3A2218" />
      <circle cx="149" cy="72" r="2.6" fill="#3A2218" />

      <!-- Eye sparkles -->
      <circle cx="72" cy="73" r="1" fill="white" />
      <circle cx="90" cy="73" r="1" fill="white" />
      <circle cx="130" cy="71" r="0.9" fill="white" />
      <circle cx="148" cy="71" r="0.9" fill="white" />

      <!-- Happy eye curves -->
      <path d="M67 70 Q73 66 79 70" stroke="#3A2218" stroke-width="1.2" fill="none" stroke-linecap="round" />
      <path d="M85 70 Q91 66 97 70" stroke="#3A2218" stroke-width="1.2" fill="none" stroke-linecap="round" />
      <path d="M125 68 Q131 64 137 68" stroke="#3A2218" stroke-width="1.2" fill="none" stroke-linecap="round" />
      <path d="M143 68 Q149 64 155 68" stroke="#3A2218" stroke-width="1.2" fill="none" stroke-linecap="round" />

      <!-- Smiles -->
      <path d="M75 87 Q82 94 89 87" stroke="#C97A6A" stroke-width="1.8" fill="none" stroke-linecap="round" />
      <path d="M133 85 Q140 92 147 85" stroke="#C97A6A" stroke-width="1.8" fill="none" stroke-linecap="round" />

      <!-- Small flower on left girl's hair -->
      <circle cx="65" cy="58" r="5" fill="#F8A4B8" />
      <circle cx="61" cy="55" r="4" fill="#F8B8C8" />
      <circle cx="69" cy="55" r="4" fill="#F8B8C8" />
      <circle cx="63" cy="52" r="4" fill="#F8CCD8" />
      <circle cx="67" cy="52" r="4" fill="#F8CCD8" />
      <circle cx="65" cy="54" r="2.5" fill="#FEE07A" />

      <!-- Bodies / Dresses -->
      <!-- Left girl dress -->
      <path d="M58 102 Q52 118 48 150 L116 150 Q112 118 106 102 Z" fill="#F5A8A8" />
      <!-- Right girl dress -->
      <path d="M116 100 Q110 116 108 148 L172 148 Q170 116 164 100 Z" fill="#F8C4B4" />

      <!-- Arms hugging -->
      <!-- Left arm wrapping around right girl -->
      <path d="M106 108 Q120 115 130 108" stroke="#FDDCB5" stroke-width="10" fill="none" stroke-linecap="round" />
      <!-- Right arm wrapping around left girl -->
      <path d="M116 106 Q104 114 94 106" stroke="#FED7B0" stroke-width="9" fill="none" stroke-linecap="round" />

      <!-- Collar details -->
      <path d="M76 100 Q82 106 88 100" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6" />
      <path d="M132 98 Q140 104 148 98" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6" />

      <!-- Small hearts between them -->
      <text x="96" y="125" font-size="10" fill="#E87070" opacity="0.7">♥</text>
    </svg>
  </div>

  <div class="deco-line"></div>
  <div class="title">给 小 辛</div>
  <div class="subtitle">— 我最好的朋友 —</div>

  <div class="tap-hint">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    <span class="tap-hint-text">点 击 这 里</span>
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>

  <div class="message-wrapper" id="messageWrapper"></div>
  <div class="message-counter" id="counter"></div>
</div>

<script>
const messages = [
  "小辛，还记得高中时我们一起去花店吗？🌸<br>你总说我挑的花最好看，其实是因为和你在一起，什么花都变得特别美。",
  "好想念你奶奶做的红烧肉啊！🍖<br>那是我吃过全世界最好吃的红烧肉，每次去你家都要吃两大碗饭，你奶奶还总说\"多吃点多吃点\"。",
  "翻看我们高中一起拍的照片，📸<br>每一张都是青春里最甜的样子。和你一起合照的每一个瞬间，都是我最珍贵的宝藏。",
  "高中三年，最幸运的事就是遇见你。💕<br>一起逛街、一起买花、一起在操场上晒太阳聊八卦，每一个普通的日子因为有你都变得闪闪发光。",
  "还记得在你家阳台聊天到天黑吗？🌙<br>你奶奶在厨房里做红烧肉，香味飘上来，那时候觉得，这就是最温暖的人间烟火。",
  "不管以后我们去到哪里，✨<br>你永远是我最好的朋友。三年很短很短，但我们的友谊一定会很长很长很长。",
  "小辛，谢谢你陪我走过整个高中。💝<br>那些一起哭过笑过的日子，是我心里最柔软最温暖的那一块。",
  "下次回去，第一件事就是去你家！🏠<br>我要吃你奶奶做的红烧肉，要和你一起拍照，要像以前那样在你房间里聊到半夜。",
  "你是我见过最温暖的人，🌻<br>像春天的花、夏天的风、秋天的落叶、冬天的暖阳。认识你，真的很幸福。",
  "还记得我们一起去买花的那条街吗？🌷<br>你抱着一大束花走在前面，我就在后面偷拍你，那张照片我现在还留着。",
  "高中毕业不是终点，💗<br>我们的故事还会一直一直写下去。小辛，很高兴认识你，更高兴这么多年一直有你。",
  "有时候想起高中的事就忍不住笑，😂<br>我们在课堂上偷偷传纸条、下课一起去小卖部、周末约着出去玩……那些日子真的太美好了。",
  "小辛，你知道吗？🌟<br>每次别人问我最好的朋友是谁，我都会毫不犹豫地说你的名字。从高中到现在，从来没变过。",
  "我在你家吃过无数顿饭，🍚<br>你奶奶的红烧肉、糖醋排骨、番茄炒蛋……每一样都是家的味道。谢谢你们一家人对我的好。",
  "我们一起去过的那些地方，🏞️<br>一起拍过的那些照片，一起笑过的那些瞬间，都是我青春里最美的印记。小辛，有你真好。"
];

let shownMessages = [];
let revealed = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let shuffled = shuffle(messages);
let index = 0;

function showMessage() {
  const card = document.getElementById('card');
  const wrapper = document.getElementById('messageWrapper');
  const counter = document.getElementById('counter');

  if (!revealed) {
    card.classList.add('revealed');
    revealed = true;
  }

  if (index >= shuffled.length) {
    // All messages shown, reshuffle
    shuffled = shuffle(messages);
    index = 0;
    shownMessages = [];
  }

  const msg = shuffled[index];
  shownMessages.push(msg);
  index++;

  // Animate message
  wrapper.style.opacity = '0';
  wrapper.style.transform = 'translateY(8px)';
  wrapper.style.transition = 'opacity 0.15s ease, transform 0.15s ease';

  setTimeout(() => {
    wrapper.innerHTML = `<div class="message">${msg}</div>`;
    wrapper.style.opacity = '1';
    wrapper.style.transform = 'translateY(0)';
  }, 180);

  counter.textContent = `已为你准备了 ${messages.length} 句心里话 · 点击继续`;
}

// Generate floating petals
(function() {
  const container = document.getElementById('petals');
  const petalColors = ['#F8C4B4', '#F5A8A8', '#FDDCB5', '#F8D0C0', '#F9DCC4', '#FFD1D1'];
  const petalShapes = ['🌸', '💮', '🌷', '✿', '❀', '🌺'];

  for (let i = 0; i < 18; i++) {
    const petal = document.createElement('span');
    petal.className = 'petal';
    petal.textContent = petalShapes[Math.floor(Math.random() * petalShapes.length)];
    petal.style.left = Math.random() * 100 + '%';
    petal.style.fontSize = (10 + Math.random() * 18) + 'px';
    petal.style.animationDuration = (10 + Math.random() * 16) + 's';
    petal.style.animationDelay = Math.random() * 12 + 's';
    petal.style.color = petalColors[Math.floor(Math.random() * petalColors.length)];
    container.appendChild(petal);
  }
})();
</script>
</body>
</html>
