<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>给小辛 · 我们的故事书</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,sans-serif;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none; user-select: none;
  background: #FDF6F0;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 999; pointer-events: none;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='paper'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.04' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23paper)' opacity='0.06'/%3E%3C/svg%3E");
  opacity: 0.7;
}
.book { position: fixed; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center; }
.page {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: env(safe-area-inset-top) 28px calc(28px + env(safe-area-inset-bottom));
  transition: transform .55s cubic-bezier(.4,0,.2,1), opacity .45s ease;
  will-change: transform, opacity;
}
.page.active { transform: translateX(0) scale(1); opacity: 1; z-index: 10; }
.page.exit-left { transform: translateX(-30%) scale(.92); opacity: 0; z-index: 5; }
.page.enter-from-right { transform: translateX(30%) scale(.92); opacity: 0; z-index: 5; }

.bg-orange {
  background: radial-gradient(ellipse 60% 50% at 25% 30%, #FFF3E0 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 75% 60%, #FFE0B2 0%, transparent 65%),
    radial-gradient(ellipse 70% 40% at 50% 20%, #FFCC80 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 30% 80%, #FFE0B2 0%, transparent 55%),
    radial-gradient(ellipse 60% 30% at 70% 40%, #FFF8E1 0%, transparent 50%), #FDF4E3;
}
.bg-green {
  background: radial-gradient(ellipse 55% 45% at 30% 35%, #E8F5E9 0%, transparent 65%),
    radial-gradient(ellipse 60% 50% at 70% 55%, #C8E6C9 0%, transparent 60%),
    radial-gradient(ellipse 65% 35% at 40% 25%, #DCEDC8 0%, transparent 55%),
    radial-gradient(ellipse 50% 55% at 20% 75%, #F1F8E9 0%, transparent 50%),
    radial-gradient(ellipse 55% 40% at 60% 35%, #E8F5E9 0%, transparent 50%), #F5F9F0;
}
.bg-pink {
  background: radial-gradient(ellipse 60% 50% at 25% 30%, #FCE4EC 0%, transparent 65%),
    radial-gradient(ellipse 50% 55% at 70% 60%, #F8BBD0 0%, transparent 60%),
    radial-gradient(ellipse 65% 35% at 50% 20%, #F48FB1 0%, transparent 55%),
    radial-gradient(ellipse 55% 50% at 30% 80%, #FCE4EC 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 65% 40%, #FFF0F3 0%, transparent 50%), #FDF5F7;
}
.bg-blue {
  background: radial-gradient(ellipse 55% 45% at 30% 35%, #E3F2FD 0%, transparent 65%),
    radial-gradient(ellipse 60% 50% at 65% 55%, #BBDEFB 0%, transparent 60%),
    radial-gradient(ellipse 65% 35% at 45% 25%, #B3E5FC 0%, transparent 55%),
    radial-gradient(ellipse 50% 55% at 20% 75%, #E1F5FE 0%, transparent 50%),
    radial-gradient(ellipse 55% 40% at 60% 35%, #E3F2FD 0%, transparent 55%), #F5F9FC;
}
.bg-yellow {
  background: radial-gradient(ellipse 55% 50% at 25% 30%, #FFF9C4 0%, transparent 65%),
    radial-gradient(ellipse 60% 50% at 70% 55%, #FFE082 0%, transparent 60%),
    radial-gradient(ellipse 65% 35% at 50% 20%, #FFF176 0%, transparent 55%),
    radial-gradient(ellipse 50% 55% at 30% 80%, #FFF9C4 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 65% 40%, #FFFDE7 0%, transparent 50%), #FFFEF5;
}

.illust { width: 240px; height: 220px; flex-shrink: 0; margin-bottom: 8px; position: relative; }
.scene-title {
  font-family: "Ma Shan Zheng","ZCOOL KuaiLe","KaiTi",serif;
  font-size: 26px; color: #5D4037; letter-spacing: 2px; margin-bottom: 10px; opacity: .85;
}
.scene-msg {
  font-size: 16px; line-height: 1.85; color: #4E342E; text-align: center;
  max-width: 320px; font-weight: 500; letter-spacing: .4px; padding: 0 4px;
}
.page-num {
  position: fixed; right: max(18px, env(safe-area-inset-right)); bottom: max(20px, env(safe-area-inset-bottom));
  font-family: "ZCOOL KuaiLe","Ma Shan Zheng",serif; font-size: 13px; color: #A1887F;
  opacity: .6; z-index: 20; pointer-events: none; transition: opacity .4s ease;
}
.tap-hint-cover {
  position: fixed; bottom: max(60px, calc(40px + env(safe-area-inset-bottom)));
  left: 50%; transform: translateX(-50%); z-index: 20; pointer-events: none;
  font-size: 13px; color: #A1887F; letter-spacing: 2px;
  animation: hintFloat 2.2s ease-in-out infinite; opacity: .7;
}
@keyframes hintFloat {
  0%,100% { opacity: .45; transform: translateX(-50%) translateY(0); }
  50% { opacity: .85; transform: translateX(-50%) translateY(-6px); }
}
.flip-dots { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 90vw; }
.flip-dot { width: 6px; height: 6px; border-radius: 50%; background: #D7CCC8; transition: all .3s ease; }
.flip-dot.current { background: #8D6E63; transform: scale(1.4); }

@media (max-width: 360px) {
  .illust { width: 200px; height: 185px; }
  .scene-title { font-size: 22px; }
  .scene-msg { font-size: 15px; line-height: 1.75; }
}
@media (min-width: 420px) {
  .illust { width: 280px; height: 255px; }
  .scene-title { font-size: 28px; }
  .scene-msg { font-size: 17px; }
}
</style>
</head>

var currentPage = 0;
var totalPages = scenes.length;
var isAnimating = false;
var book = document.getElementById('book');
var pageNum = document.getElementById('pageNum');
var tapHint = document.getElementById('tapHint');
var flipDots = document.getElementById('flipDots');

for (var i = 0; i < totalPages; i++) {
  var dot = document.createElement('span');
  dot.className = 'flip-dot' + (i === 0 ? ' current' : '');
  dot.id = 'dot' + i;
  flipDots.appendChild(dot);
}

function renderPage(index) {
  var s = scenes[index];
  return '<div class="page active ' + s.bg + '" id="page' + index + '"><div class="illust">' + s.svg + '</div><div class="scene-title">' + s.title + '</div><div class="scene-msg">' + s.msg + '</div></div>';
}

book.innerHTML = renderPage(0);
updateUI();

function updateUI() {
  pageNum.textContent = (currentPage + 1) + ' / ' + totalPages;
  for (var i = 0; i < totalPages; i++) {
    var dot = document.getElementById('dot' + i);
    if (dot) dot.className = 'flip-dot' + (i === currentPage ? ' current' : '');
  }
  if (currentPage > 0) {
    tapHint.style.transition = 'opacity .5s ease';
    tapHint.style.opacity = '0';
  }
}

function flipPage(event) {
  if (isAnimating) return;
  isAnimating = true;
  var oldPage = currentPage;
  var nextPage = (currentPage + 1) % totalPages;
  var oldEl = document.getElementById('page' + oldPage);
  if (oldEl) {
    oldEl.className = oldEl.className.replace(' active', '') + ' exit-left';
  }
  book.insertAdjacentHTML('beforeend', renderPage(nextPage));
  requestAnimationFrame(function() {
    var newEl = document.getElementById('page' + nextPage);
    if (newEl) {
      newEl.className = newEl.className.replace(' active', '') + ' enter-from-right';
      requestAnimationFrame(function() {
        newEl.className = 'page active ' + scenes[nextPage].bg;
      });
    }
  });
  setTimeout(function() {
    if (oldEl) oldEl.remove();
    currentPage = nextPage;
    updateUI();
    isAnimating = false;
  }, 500);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault();
    flipPage();
  }
});
</script>
