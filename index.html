<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>给小辛</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
    background: linear-gradient(165deg, #FFF3E6 0%, #FFE4CC 25%, #FFD4A8 55%, #FDDCB5 80%, #FFECD2 100%);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    background-attachment: fixed;
  }

  /* Warm grain overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.5;
  }

  /* Floating elements */
  .floating {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .float-item {
    position: absolute;
    opacity: 0.4;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(105vh) rotate(0deg) scale(0.4); opacity: 0; }
    8%   { opacity: 0.45; }
    85%  { opacity: 0.35; }
    100% { transform: translateY(-10vh) rotate(380deg) scale(1.05); opacity: 0; }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 1;
    width: 90vw;
    max-width: 380px;
    background: rgba(255,255,250,0.5);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 32px;
    padding: 32px 24px 28px;
    box-shadow:
      0 8px 48px rgba(200,140,80,0.15),
      0 2px 8px rgba(200,140,80,0.06),
      inset 0 1px 0 rgba(255,255,255,0.6);
    text-align: center;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    border: 1px solid rgba(255,220,180,0.4);
  }
  .card:active {
    transform: scale(0.965);
    box-shadow:
      0 4px 20px rgba(200,140,80,0.12),
      inset 0 1px 0 rgba(255,255,255,0.4);
  }

  /* Illustration */
  .illustration {
    position: relative;
    width: 240px;
    height: 240px;
    margin: -8px auto 16px;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .card.revealed .illustration {
    transform: scale(0.68) translateY(-16px);
  }

  /* Sparkle effect on tap */
  .sparkle-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    animation: sparklePop 0.8s ease-out forwards;
    opacity: 0;
  }
  @keyframes sparklePop {
    0%   { opacity: 0; transform: scale(0) rotate(0deg); }
    30%  { opacity: 1; transform: scale(1.3) rotate(20deg); }
    100% { opacity: 0; transform: scale(0.3) rotate(90deg) translateY(-20px); }
  }

  .title {
    font-size: 28px;
    font-weight: 700;
    color: #B86B3A;
    margin-bottom: 4px;
    letter-spacing: 4px;
    transition: all 0.5s ease;
  }
  .card.revealed .title {
    font-size: 19px;
    margin-bottom: 0;
  }

  .subtitle {
    font-size: 13px;
    color: #C9936B;
    margin-bottom: 12px;
    letter-spacing: 2px;
    font-weight: 500;
  }

  /* Tap hint */
  .tap-hint {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #D4A87C;
    animation: gentleFloat 2.4s ease-in-out infinite;
    margin-bottom: 2px;
  }
  .tap-hint .cookie {
    display: inline-block;
    animation: cookieBounce 1.4s ease-in-out infinite;
    font-size: 15px;
  }
  .tap-hint .cookie:nth-child(2) { animation-delay: 0.18s; }
  .tap-hint .cookie:nth-child(3) { animation-delay: 0.36s; }
  @keyframes gentleFloat {
    0%, 100% { opacity: 0.55; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-4px); }
  }
  @keyframes cookieBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-6px) scale(1.15); }
  }
  .card.revealed .tap-hint {
    animation: none;
    opacity: 0.75;
  }
  .card.revealed .tap-hint-text {
    font-size: 12px;
  }

  /* Message area */
  .message-wrapper {
    position: relative;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 6px;
    transition: min-height 0.5s ease;
  }
  .card.revealed .message-wrapper {
    min-height: 110px;
  }

  .message {
    font-size: 16px;
    line-height: 1.85;
    color: #6B3A28;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 14px 6px;
    animation: msgSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes msgSlideIn {
    from { opacity: 0; transform: translateY(14px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message-counter {
    font-size: 11px;
    color: #D4A88C;
    margin-top: 4px;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .card.revealed .message-counter {
    opacity: 1;
  }

  /* Decorative line */
  .deco-line {
    width: 36px;
    height: 2.5px;
    background: linear-gradient(90deg, #F0C090, #E8A870, #F0C090);
    border-radius: 2px;
    margin: 0 auto 12px;
    transition: width 0.5s ease;
  }
  .card.revealed .deco-line {
    width: 56px;
  }

  /* Footer hint */
  .footer-hint {
    position: fixed;
    bottom: max(16px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
    font-size: 11px;
    color: #C99B76;
    letter-spacing: 1.5px;
    opacity: 0.6;
    pointer-events: none;
  }

  /* Small screen adjustments */
  @media (max-width: 360px) {
    .card { padding: 24px 16px 22px; }
    .illustration { width: 200px; height: 200px; }
    .title { font-size: 24px; }
    .message { font-size: 15px; line-height: 1.75; }
  }
  @media (min-width: 420px) {
    .illustration { width: 250px; height: 250px; }
  }
</style>
</head>
<body>

<div class="floating" id="floating"></div>

<div class="card" id="card" onclick="showMessage(event)">
  <div class="illustration">
    <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="warmGlow" cx="50%" cy="38%" r="50%">
          <stop offset="0%" stop-color="#FFE0B2" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#FFE0B2" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="blushGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#FFAB91" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#FFAB91" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- Warm glow behind -->
      <circle cx="120" cy="105" r="95" fill="url(#warmGlow)"/>

      <!-- === Wooden desk === -->
      <rect x="24" y="172" width="192" height="12" rx="6" fill="#D4A06A"/>
      <rect x="28" y="168" width="184" height="8" rx="4" fill="#E0B880"/>
      <rect x="20" y="182" width="200" height="6" rx="3" fill="#C08858"/>

      <!-- === Left character (darker hair, warm skin) === -->
      <!-- Hair back -->
      <ellipse cx="82" cy="102" rx="36" ry="38" fill="#4E342E"/>
      <rect x="46" y="100" width="20" height="52" rx="10" fill="#4E342E"/>
      <rect x="98" y="97" width="18" height="55" rx="9" fill="#4E342E"/>
      <!-- Bangs -->
      <ellipse cx="82" cy="88" rx="33" ry="16" fill="#5D4037"/>

      <!-- Face -->
      <ellipse cx="84" cy="100" rx="27" ry="29" fill="#FDEBD0"/>

      <!-- Blush -->
      <ellipse cx="68" cy="108" rx="8" ry="5" fill="url(#blushGrad)"/>
      <ellipse cx="100" cy="108" rx="8" ry="5" fill="url(#blushGrad)"/>

      <!-- Eyes (happy curved) -->
      <path d="M70 95 Q76 89 82 95" stroke="#3E2723" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M86 95 Q92 89 98 95" stroke="#3E2723" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Eye dots -->
      <circle cx="76" cy="94" r="2.2" fill="#3E2723"/>
      <circle cx="92" cy="94" r="2.2" fill="#3E2723"/>
      <!-- Eye sparkle -->
      <circle cx="74.5" cy="92.5" r="0.9" fill="white" opacity="0.8"/>
      <circle cx="90.5" cy="92.5" r="0.9" fill="white" opacity="0.8"/>

      <!-- Smile -->
      <path d="M78 110 Q84 118 90 110" stroke="#D4846A" stroke-width="1.8" fill="#D4846A" fill-opacity="0.15" stroke-linecap="round"/>

      <!-- === Right character (lighter brown hair) === -->
      <!-- Hair back -->
      <ellipse cx="156" cy="98" rx="34" ry="36" fill="#6D4C41"/>
      <rect x="138" y="94" width="17" height="48" rx="9" fill="#6D4C41"/>
      <rect x="172" y="93" width="15" height="50" rx="8" fill="#6D4C41"/>
      <!-- Bangs -->
      <ellipse cx="156" cy="84" rx="31" ry="15" fill="#795548"/>

      <!-- Small hair clip -->
      <circle cx="180" cy="78" r="5.5" fill="#FFB74D"/>
      <circle cx="180" cy="78" r="3" fill="#FFCC80"/>

      <!-- Face -->
      <ellipse cx="156" cy="96" rx="26" ry="28" fill="#FEE4CD"/>

      <!-- Blush -->
      <ellipse cx="140" cy="104" rx="7.5" ry="4.5" fill="url(#blushGrad)"/>
      <ellipse cx="172" cy="104" rx="7.5" ry="4.5" fill="url(#blushGrad)"/>

      <!-- Eyes -->
      <path d="M142 91 Q148 85 154 91" stroke="#3E2723" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M158 91 Q164 85 170 91" stroke="#3E2723" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="148" cy="90" r="2" fill="#3E2723"/>
      <circle cx="164" cy="90" r="2" fill="#3E2723"/>
      <circle cx="146.5" cy="88.5" r="0.85" fill="white" opacity="0.8"/>
      <circle cx="162.5" cy="88.5" r="0.85" fill="white" opacity="0.8"/>

      <!-- Smile (slightly bigger grin) -->
      <path d="M150 106 Q156 115 162 106" stroke="#D4846A" stroke-width="1.8" fill="#D4846A" fill-opacity="0.15" stroke-linecap="round"/>

      <!-- === Bodies / shoulders === -->
      <path d="M56 126 Q52 148 58 172 L110 172 Q114 148 112 126 Z" fill="#FFAB91"/>
      <path d="M128 122 Q124 144 126 172 L182 172 Q186 144 180 122 Z" fill="#FFCC80"/>

      <!-- Collar details -->
      <path d="M78 126 Q84 133 90 126" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M146 122 Q152 129 158 122" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>

      <!-- === Snacks between them on the desk === -->
      <!-- Cookie 1 -->
      <circle cx="115" cy="160" r="8" fill="#F4C78A" stroke="#D4A060" stroke-width="1.2"/>
      <circle cx="113" cy="158" r="1.5" fill="#5D4037" opacity="0.6"/>
      <circle cx="117" cy="161" r="1.3" fill="#5D4037" opacity="0.5"/>
      <circle cx="114" cy="163" r="1.2" fill="#5D4037" opacity="0.55"/>

      <!-- Cookie 2 -->
      <circle cx="128" cy="156" r="7" fill="#F0BE80" stroke="#D4A060" stroke-width="1.2"/>
      <circle cx="126" cy="154" r="1.3" fill="#5D4037" opacity="0.55"/>
      <circle cx="130" cy="157" r="1.4" fill="#5D4037" opacity="0.5"/>

      <!-- Tangerine -->
      <circle cx="109" cy="154" r="9" fill="#FF8C42" stroke="#E87830" stroke-width="1"/>
      <circle cx="109" cy="154" r="5" fill="#FFA366"/>
      <line x1="109" y1="149" x2="109" y2="146" stroke="#E87830" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Tangerine leaf -->
      <ellipse cx="113" cy="147" rx="4" ry="2.5" fill="#81C784" transform="rotate(30 113 147)"/>

      <!-- Candy -->
      <ellipse cx="135" cy="162" rx="6" ry="4" fill="#F8BBD0" stroke="#EC8FA8" stroke-width="1"/>
      <ellipse cx="135" cy="162" rx="6" ry="4" fill="none" stroke="white" stroke-width="0.6" stroke-dasharray="0.5 2" opacity="0.6"/>

      <!-- Strawberry -->
      <ellipse cx="122" cy="165" rx="5" ry="6" fill="#EF5350"/>
      <circle cx="120" cy="162" r="0.8" fill="#FFCDD2" opacity="0.7"/>
      <circle cx="123" cy="163" r="0.7" fill="#FFCDD2" opacity="0.6"/>
      <circle cx="121" cy="165" r="0.6" fill="#FFCDD2" opacity="0.55"/>
      <path d="M119 160 Q122 156 125 160" stroke="#66BB6A" stroke-width="1.5" fill="#66BB6A" stroke-linecap="round"/>

      <!-- Small hearts floating above snacks -->
      <text x="106" y="140" font-size="11" fill="#E87070" opacity="0.55">♥</text>
      <text x="132" y="138" font-size="8" fill="#FF8A80" opacity="0.5">♥</text>
    </svg>
  </div>

  <div class="deco-line"></div>
  <div class="title">给 小 辛</div>
  <div class="subtitle">— 三年高中好友 · 一起买花拍照 —</div>

  <div class="tap-hint">
    <span class="cookie">🍪</span>
    <span class="cookie">🍊</span>
    <span class="cookie">🍬</span>
    <span class="tap-hint-text">点 一 下 · 有 话 给 你</span>
    <span class="cookie">🍬</span>
    <span class="cookie">🍊</span>
    <span class="cookie">🍪</span>
  </div>

  <div class="message-wrapper" id="messageWrapper"></div>
  <div class="message-counter" id="counter"></div>
</div>

<div class="footer-hint">📱 收藏起来 · 随时打开看看</div>

<script>
const messages = [
  "小辛，还记得高中时我们一起去花店吗？🌸<br>你总说我挑的花最好看，其实是因为和你在一起，什么花都变得特别美。",
  "好想念你奶奶做的红烧肉啊！🍖<br>那是我吃过全世界最好吃的红烧肉，每次去你家都要吃两大碗饭，你奶奶还总说\"多吃点多吃点\"。",
  "翻看我们高中一起拍的照片，📸<br>每一张都是青春里最甜的样子。和你一起合照的每一个瞬间，都是我最珍贵的宝藏。",
  "高中三年，最幸运的事就是遇见你。💕<br>一起逛街、一起买花、一起在操场上晒太阳聊八卦，每一个普通的日子因为有你都变得闪闪发光。",
  "还记得在你家阳台聊天到天黑吗？🌙<br>你奶奶在厨房里做红烧肉，香味飘上来，那时候觉得，这就是最温暖的人间烟火。",
  "不管以后我们去到哪里，✨<br>你永远是我最好的朋友。三年很短很短，但我们的友谊一定会很长很长很长。",
  "小辛，谢谢你陪我走过整个高中。💝<br>那些一起哭过笑过的日子，是我心里最柔软最温暖的那一块。",
  "下次回去，第一件事就是去你家！🏠<br>我要吃你奶奶做的红烧肉，要和你一起拍照，要像以前那样在你房间里聊到半夜。",
  "还记得我们一起去买花的那条街吗？🌷<br>你抱着一大束花走在前面，我就在后面偷拍你，那张照片我现在还留着。",
  "你是我见过最温暖的人，🌻<br>像春天的花、夏天的风、秋天的落叶、冬天的暖阳。认识你，真的很幸福。",
  "高中毕业不是终点，💗<br>我们的故事还会一直一直写下去。小辛，很高兴认识你，更高兴这么多年一直有你。",
  "有时候想起高中的事就忍不住笑，😂<br>我们在课堂上偷偷传纸条、下课一起去小卖部、周末约着出去玩……那些日子真的太美好了。",
  "小辛，你知道吗？🌟<br>每次别人问我最好的朋友是谁，我都会毫不犹豫地说你的名字。从高中到现在，从来没变过。",
  "我在你家吃过无数顿饭，🍚<br>你奶奶的红烧肉、糖醋排骨、番茄炒蛋……每一样都是家的味道。谢谢你们一家人对我的好。",
  "我们一起去过的那些地方，🏞️<br>一起拍过的那些照片，一起笑过的那些瞬间，都是我青春里最美的印记。小辛，有你真好。"
];

let shownMessages = [];
let revealed = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let shuffled = shuffle(messages);
let index = 0;

function spawnSparkles(x, y) {
  const card = document.getElementById('card');
  const emojis = ['✨','💫','🌟','⭐','💛'];

  for (let i = 0; i < 7; i++) {
    const spark = document.createElement('span');
    spark.className = 'sparkle';
    spark.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    spark.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
    spark.style.top = (y + (Math.random() - 0.5) * 60) + 'px';
    spark.style.fontSize = (8 + Math.random() * 14) + 'px';
    spark.style.animationDuration = (0.5 + Math.random() * 0.7) + 's';
    spark.style.animationDelay = Math.random() * 0.12 + 's';
    document.body.appendChild(spark);
    setTimeout(() => spark.remove(), 1000);
  }
}

function showMessage(event) {
  const card = document.getElementById('card');
  const wrapper = document.getElementById('messageWrapper');
  const counter = document.getElementById('counter');

  if (event) {
    spawnSparkles(event.clientX, event.clientY);
  }

  if (!revealed) {
    card.classList.add('revealed');
    revealed = true;
  }

  if (index >= shuffled.length) {
    shuffled = shuffle(messages);
    index = 0;
    shownMessages = [];
  }

  const msg = shuffled[index];
  shownMessages.push(msg);
  index++;

  wrapper.style.opacity = '0';
  wrapper.style.transform = 'translateY(8px)';
  wrapper.style.transition = 'opacity 0.12s ease, transform 0.12s ease';

  setTimeout(() => {
    wrapper.innerHTML = `<div class="message">${msg}</div>`;
    wrapper.style.opacity = '1';
    wrapper.style.transform = 'translateY(0)';
  }, 150);

  counter.textContent = `共 ${messages.length} 句心里话 · 点击继续`;
}

// Generate floating food items
(function() {
  const container = document.getElementById('floating');
  const items = [
    { emoji: '🍊', size: [14, 26] },
    { emoji: '🍪', size: [12, 22] },
    { emoji: '🍓', size: [13, 24] },
    { emoji: '🍰', size: [15, 26] },
    { emoji: '🍑', size: [14, 24] },
    { emoji: '🌸', size: [10, 18] },
    { emoji: '🍬', size: [10, 20] },
    { emoji: '💛', size: [9, 16] },
  ];

  for (let i = 0; i < 20; i++) {
    const item = items[Math.floor(Math.random() * items.length)];
    const el = document.createElement('span');
    el.className = 'float-item';
    el.textContent = item.emoji;
    el.style.left = (Math.random() * 94) + '%';
    el.style.fontSize = (item.size[0] + Math.random() * (item.size[1] - item.size[0])) + 'px';
    el.style.animationDuration = (12 + Math.random() * 18) + 's';
    el.style.animationDelay = (Math.random() * 14) + 's';
    container.appendChild(el);
  }
})();
</script>
</body>
</html>
