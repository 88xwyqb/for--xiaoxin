<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>给小江 · 我们的故事</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
    background: #F5EDE0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    perspective: 1200px;
  }

  /* Paper texture overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E");
  }

  /* Book container */
  .book {
    position: relative;
    z-index: 1;
    width: 88vw;
    max-width: 380px;
    min-height: 520px;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }

  /* Page wrapper */
  .page {
    position: relative;
    width: 100%;
    min-height: 520px;
    border-radius: 8px 18px 18px 8px;
    padding: 40px 28px 36px;
    box-shadow:
      2px 4px 24px rgba(0,0,0,0.08),
      0 1px 4px rgba(0,0,0,0.04);
    overflow: hidden;
    transition: background 1.2s ease;
  }

  /* Watercolor wash layers */
  .wash-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transition: opacity 1.2s ease;
  }

  /* Watercolor blob effect */
  .wc-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.55;
    transition: all 1.2s ease;
  }

  /* Page edge shadow (book spine side) */
  .page::before {
    content: '';
    position: absolute;
    left: -2px; top: 0;
    width: 14px; height: 100%;
    background: linear-gradient(90deg, rgba(0,0,0,0.06), rgba(0,0,0,0.02) 40%, transparent);
    border-radius: 2px;
    pointer-events: none;
  }

  /* Scene illustration area */
  .scene {
    position: relative;
    width: 100%;
    height: 220px;
    margin: 0 auto 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scene svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.06));
  }

  /* Hand-drawn style title for chapter */
  .chapter-label {
    text-align: center;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-family: "Georgia", "Times New Roman", serif;
    opacity: 0.5;
  }

  .page-title {
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 3px;
    margin-bottom: 16px;
    font-family: "STKaiti", "KaiTi", "楷体", "PingFang SC", serif;
    line-height: 1.4;
  }

  /* Message text */
  .page-message {
    font-size: 15px;
    line-height: 2;
    text-align: center;
    font-weight: 400;
    letter-spacing: 0.5px;
    padding: 0 4px;
    animation: textFadeIn 0.6s ease;
  }
  @keyframes textFadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Page number */
  .page-num {
    text-align: center;
    font-size: 11px;
    margin-top: 16px;
    letter-spacing: 2px;
    opacity: 0.4;
  }

  /* Chapter divider */
  .chapter-divider {
    width: 30px;
    height: 1px;
    margin: 10px auto 16px;
    opacity: 0.35;
    transition: all 0.8s ease;
  }

  /* Sparkles */
  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    animation: sparkPop 0.7s ease-out forwards;
    opacity: 0;
  }
  @keyframes sparkPop {
    0%   { opacity: 0; transform: scale(0) rotate(0deg); }
    25%  { opacity: 1; transform: scale(1.2) rotate(15deg); }
    100% { opacity: 0; transform: scale(0.2) rotate(80deg) translateY(-24px); }
  }

  /* Book spine */
  .spine {
    position: absolute;
    left: 0; top: 0;
    width: 8px; height: 100%;
    background: rgba(0,0,0,0.03);
    border-radius: 4px 0 0 4px;
    pointer-events: none;
  }

  /* Bottom hint */
  .bottom-hint {
    position: fixed;
    bottom: max(14px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
    font-size: 11px;
    letter-spacing: 2px;
    opacity: 0.45;
    pointer-events: none;
  }

  @media (max-width: 360px) {
    .page { padding: 32px 18px 28px; min-height: 460px; }
    .scene { height: 180px; }
    .page-title { font-size: 19px; }
    .page-message { font-size: 14px; line-height: 1.9; }
  }
</style>
</head>

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function resetPageOrder() {
  pageOrder = [];
  for (var i = 0; i < pages.length; i++) { pageOrder.push(i); }
  pageOrder = shuffle(pageOrder);
}

resetPageOrder();

function spawnSparkles(x, y) {
  var emojis = ['✨','💫','⭐','✉','💌'];
  for (var i = 0; i < 8; i++) {
    var spark = document.createElement('span');
    spark.className = 'sparkle';
    spark.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    spark.style.left = (x + (Math.random() - 0.5) * 100) + 'px';
    spark.style.top = (y + (Math.random() - 0.5) * 70) + 'px';
    spark.style.fontSize = (9 + Math.random() * 16) + 'px';
    spark.style.animationDuration = (0.5 + Math.random() * 0.8) + 's';
    spark.style.animationDelay = Math.random() * 0.15 + 's';
    document.body.appendChild(spark);
    setTimeout(function() { spark.remove(); }, 1000);
  }
}

function applyWatercolor(chapter) {
  var ch = chapters[chapter];
  var wash = document.getElementById('washLayer');
  var colors = ch.wcColors;

  // Create watercolor blobs
  var blobs = '';
  for (var i = 0; i < 4; i++) {
    var size = 140 + Math.random() * 80;
    var x = 20 + Math.random() * 60;
    var y = 15 + Math.random() * 70;
    var opacity = 0.35 + Math.random() * 0.25;
    blobs += '<div class="wc-blob" style="width:' + size + 'px;height:' + size + 'px;'
      + 'left:' + x + '%;top:' + y + '%;'
      + 'background:' + colors[i] + ';opacity:' + opacity + ';"></div>';
  }
  wash.innerHTML = blobs;
}

function showPage(pageIndex, event) {
  var chIdx = pages[pageIndex].ch;
  var ch = chapters[chIdx];

  // Flip animation
  var book = document.getElementById('book');
  book.style.transform = 'rotateY(-5deg)';
  setTimeout(function() {
    book.style.transform = 'rotateY(0deg)';
  }, 350);

  // Update watercolor
  applyWatercolor(chIdx);

  // Update content
  document.getElementById('chapterLabel').textContent = ch.label;
  document.getElementById('pageTitle').textContent = pages[pageIndex].title;
  document.getElementById('pageMessage').innerHTML = fullMessages[pageIndex];
  document.getElementById('pageNum').textContent = '· ' + (pageIndex + 1) + ' / ' + pages.length + ' ·';

  // Chapter colors
  document.getElementById('chapterLabel').style.color = ch.color;
  document.getElementById('pageTitle').style.color = ch.color;
  document.getElementById('divider').style.background = ch.color;
  document.getElementById('pageMessage').style.color = ch.color;

  // Scene
  document.getElementById('scene').innerHTML = chapterScenes[chIdx];

  document.getElementById('bottomHint').textContent = '点 击 翻 开 下 一 页';
}

function showCover() {
  currentPage = -1;
  var book = document.getElementById('book');
  book.style.transform = 'rotateY(0deg)';

  // Warm amber cover
  applyWatercolor(4);

  document.getElementById('chapterLabel').textContent = '';
  document.getElementById('pageTitle').textContent = '给 小 江';
  document.getElementById('pageTitle').style.color = '#8B6F5E';
  document.getElementById('pageMessage').innerHTML = '从纸条到信件<br>从高一到现在<br><br><span style="font-size:13px;opacity:0.6;">点 击 翻 开</span>';
  document.getElementById('pageMessage').style.color = '#8B6F5E';
  document.getElementById('pageNum').textContent = '';
  document.getElementById('divider').style.background = '#8B6F5E';
  document.getElementById('chapterLabel').style.color = '#8B6F5E';

  // Cover scene - decorated envelope
  document.getElementById('scene').innerHTML = chapterScenes[4];

  document.getElementById('bottomHint').textContent = '翻 开 我 们 的 故 事';
}

function flipPage(event) {
  if (event) { spawnSparkles(event.clientX, event.clientY); }

  if (pageOrder.length === 0) { resetPageOrder(); }

  currentPage++;
  if (currentPage >= pageOrder.length) {
    currentPage = 0;
    resetPageOrder();
  }

  showPage(pageOrder[currentPage], event);
}

// Initialize
showCover();

// Floating elements
(function() {
  var container = document.getElementById('floating');
  if (!container) return;
  var items = ['✿','❀','✦','◻','~','○'];
  for (var i = 0; i < 18; i++) {
    var el = document.createElement('span');
    el.style.cssText = 'position:absolute;opacity:0.22;animation:floatUp linear infinite;pointer-events:none;';
    el.textContent = items[Math.floor(Math.random() * items.length)];
    el.style.left = (Math.random() * 94) + '%';
    el.style.fontSize = (8 + Math.random() * 14) + 'px';
    el.style.animationDuration = (14 + Math.random() * 20) + 's';
    el.style.animationDelay = (Math.random() * 16) + 's';
    el.style.color = ['#C8B898','#B8C8A8','#D8B8B8','#A8B8C8','#C8A888'][Math.floor(Math.random()*5)];
    container.appendChild(el);
  }
})();
</script>

<style>
  @keyframes floatUp {
    0%   { transform: translateY(108vh) rotate(0deg) scale(0.3); opacity: 0; }
    6%   { opacity: 0.25; }
    88%  { opacity: 0.2; }
    100% { transform: translateY(-8vh) rotate(360deg) scale(1); opacity: 0; }
  }
</style>
